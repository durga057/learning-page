<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to LEARNING PAGE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8e44ad;
            --primary-light: #a55ecc;
            --bg: #0f0c20;
            --text: #ffffff;
            --text-secondary: #b0aebf;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #201335 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient floating lights */
        .ambient-light {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s ease-in-out infinite alternate;
        }

        .light-1 { top: 10%; left: 15%; }
        .light-2 { bottom: 10%; right: 15%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.2); }
        }

        .container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            z-index: 10;
            padding: 2.5rem;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transform: translateY(20px);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            to { transform: translateY(0); opacity: 1; }
        }

        .logo-icon {
            font-size: 4rem;
            color: var(--primary-light);
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(142, 68, 173, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #b0aebf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span {
            color: var(--primary-light);
            -webkit-text-fill-color: initial;
        }

        p {
            font-size: 1.15rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .btn-portal {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: #fff;
            padding: 1.1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(142, 68, 173, 0.4);
            transition: all 0.3s ease;
        }

        .btn-portal:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(142, 68, 173, 0.6);
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
        }

        .btn-portal i {
            transition: transform 0.3s ease;
        }

        .btn-portal:hover i {
            transform: translateX(5px);
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <div class="container">
        <div class="logo-icon">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>LEARNING <span>PAGE</span></h1>
        <p>Your premium gateway to academic syllabus resources, video tutorials, and interactive learning trackers. Explore our full library of branch materials and engineering notes.</p>
        <a href="home.html" class="btn-portal">
            Enter Learning Portal <i class="fas fa-arrow-right"></i>
        </a>
        <div class="footer">
            &copy; 2026 Learning Page Portal. All rights reserved.
        </div>
    </div>

</body>
</html>
